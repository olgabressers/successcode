name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Official GitHub Actions Pages pipeline (single deploy source).
# Requires: Repo -> Settings -> Pages -> Source = "GitHub Actions".
# Replaces the previous peaceiris -> gh-pages branch setup, which
# conflicted with GitHub's native branch builder and left the deploy
# step failing ("Deployment failed, try again later") since 2026-07-02.

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deployment at a time; do NOT cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (repo root, incl. CNAME)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
