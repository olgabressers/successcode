name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Official GitHub Actions Pages pipeline — the reliable deploy path for
# this repo. GitHub's legacy branch builder ("pages build and deployment")
# fails the deploy step ~most pushes (fast 8s rejection, build always OK).
# Requires: Repo -> Settings -> Pages -> Source = "GitHub Actions".

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; never cancel one in progress.
# Do NOT push commits seconds apart — rapid deploys collide.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact (repo root, incl. CNAME)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
