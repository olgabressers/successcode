<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZWDS Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #d8d4c8;
      --gold: #b8882a;
      --gold-dim: #8a6410;
      --text: #1a1a1a;
      --text-dim: #555;
      --text-muted: #888;
      --lu:   #166020;
      --quan: #1020b8;
      --ke:   #c8b000;
      --ji:   #aa1010;
      --main-star: #5a3e08;
      --helper-star: #0a6858;
      --evil-star: #8a2828;
      --natal-col:  #b02010;
      --decade-col: #1a6028;
      --annual-col: #1828b0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--gold);
    }

    header p {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── INPUT FORM ── */
    .form-panel {
      max-width: 920px;
      margin: 0 auto 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px 28px;
    }

    .form-layout-horizontal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .form-right .solar-helper {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input, select {
      background: #f8f6f2;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: var(--gold); }

    select option { background: #f8f6f2; }

    .form-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    .form-actions button { width: 100%; }

    button {
      background: var(--gold);
      color: #0d0d0f;
      border: none;
      padding: 12px 28px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }

    button:hover { background: #d4b05a; }

    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    button.secondary:hover { border-color: var(--gold-dim); color: var(--text); }

    /* ── CHART LAYOUT ── */
    .chart-panel { max-width: 1100px; margin: 0 auto; }

    .chart-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .chart-meta h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--gold);
    }

    .chart-meta .meta-pills {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .pill {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      background: #1e1a10;
      border: 1px solid var(--gold-dim);
      padding: 4px 10px;
    }

    /* ── 4×4 CHART GRID ── */
    .zwds-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, auto);
      border: 2px solid #666;
      gap: 2px;
      background: #666;
      position: relative;
    }

    .palace-cell {
      background: var(--surface);
      padding: 12px 10px;
      min-height: 160px;
      position: relative;
    }

    .palace-cell.center-cell {
      background: #f0ece4;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Only the selected decade life palace is framed */
    .palace-cell.dec-life    { outline: 2px solid var(--decade-col); outline-offset: -2px; }

    /* Palace header */
    .p-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    .p-stem, .p-branch {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 1;
    }

    /* Element colors for stems and branches */
    .el-wood  { color: #2e8a28; }
    .el-fire  { color: #c04428; }
    .el-earth { color: #9a6e10; }
    .el-metal { color: #3a6888; }
    .el-water { color: #1a6ab8; }

    .p-name-block { text-align: right; }

    .p-num {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--natal-col);
      font-weight: 600;
      display: block;
    }

    .p-name-cn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      color: var(--text-muted);
      display: block;
    }

    .p-name-en {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--natal-col);
      display: block;
      line-height: 1.2;
    }

    /* Markers */
    .palace-markers {
      display: flex;
      gap: 4px;
      position: absolute;
      top: 8px;
      right: 8px;
    }

    .marker {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      letter-spacing: 0.5px;
    }

    .marker.life { background: var(--gold); color: #fff; }
    .marker.lh   { background: #3a4880; color: #fff; }
    .marker.eh   { background: #1a3a80; color: #fff; }

    /* Stars */
    .stars-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }

    .star-item {
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.3;
    }

    .star-en {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .star-cn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
      padding-left: 4px;
    }

    .star-item.main  .star-en { color: var(--main-star); }
    .star-item.helper .star-en { color: var(--helper-star); }
    .star-item.evil  .star-en { color: var(--evil-star); }

    /* ── ENHANCER BADGES — color by type ── */
    .ebadge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 2px;
      margin-left: 2px;
      border: 1.5px solid;
      letter-spacing: 0.3px;
      vertical-align: middle;
    }
    .ebadge-lu   { background: #e0f6e0; color: var(--lu);   border-color: #3a8840; }
    .ebadge-quan { background: #e4eaff; color: var(--quan); border-color: #2848cc; }
    .ebadge-ke   { background: #fdfbe0; color: var(--ke);   border-color: var(--ke); }
    .ebadge-ji   { background: #ffe0e0; color: var(--ji);   border-color: #cc2828; }
    .ebadge-dec  { border-width: 1px; border-style: dashed; font-size: 9px; opacity: 0.85; }
    .ebadge-ann  { border-width: 1px; border-style: dotted; font-size: 9px; opacity: 0.85; }

    /* ── ANNUAL MOVABLE STARS ── */
    .pal-ann-mov { margin-top: 4px; padding-top: 3px; border-top: 1px dashed #8898d8; }
    .ann-mov-item { display: flex; align-items: center; gap: 5px; line-height: 1.4; }
    .ann-mov-prefix { font-size: 9px; font-weight: 700; color: var(--annual-col); opacity: 0.8; }
    .ann-mov-name { font-size: 12px; font-weight: 600; color: var(--annual-col); }
    .ann-mov-name.evil { color: #8a2828; }
    .ann-mov-cn { font-family: 'Cormorant Garamond', serif; font-size: 11px; color: #8898d8; }

    /* ── CYCLE YEARS IN PALACE ── */
    .pal-cycle-years {
      font-size: 9px;
      color: #1a1a1a;
      margin-top: 5px;
      line-height: 1.9;
      letter-spacing: 0.3px;
    }

    /* ── YEAR/AGE IN PALACE ── */
    .pal-year-row { margin-top: 6px; padding-top: 4px; border-top: 1px solid var(--border); }
    .pal-year-tag {
      display: inline-block; font-size: 10px; cursor: pointer;
      padding: 1px 6px; border-radius: 2px;
      border: 1px solid #8898d8; background: #f0f0ff;
      color: var(--annual-col); white-space: nowrap;
    }
    .pal-year-tag:hover { background: #dde4ff; }
    .pal-year-tag.is-active { background: #c8d4ff; font-weight: 700; border-color: #3050c0; }
    .pal-year-tag.out-decade { color: #999; border-color: #ccc; background: #f5f5f5; font-style: italic; }
    .pal-year-tag.out-decade:hover { background: #ece; }
    .pal-dec-age { font-size: 10px; color: var(--decade-col); margin-left: 6px; font-weight: 600; }

    /* Center panel */
    .center-content {
      text-align: center;
      padding: 16px;
    }

    .center-content .cc-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: 4px;
    }

    .center-content .cc-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: var(--gold);
      display: block;
      margin-bottom: 12px;
    }

    .center-content .birth-date {
      font-size: 13px;
      color: var(--text);
      line-height: 2;
    }

    /* ── DECADE TABLE ── */
    .decades-section {
      margin-top: 32px;
    }

    .section-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 16px;
    }

    .decades-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .decade-cell {
      background: var(--surface);
      padding: 14px 16px;
    }

    .decade-cell.current { background: #fef4e0; border: 2px solid var(--gold); }

    .decade-num {
      font-size: 11px;
      letter-spacing: 1px;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .decade-age {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin: 4px 0;
    }

    .decade-stem {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold);
      margin: 2px 0;
    }

    .decade-palace {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-top: 4px;
    }

    .decade-years {
      font-size: 11px;
      color: #333;
      margin-top: 2px;
      font-weight: 500;
    }

    /* ── ENHANCER LEGEND ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .legend-sep {
      color: var(--border);
      font-size: 18px;
    }

    /* ── ERROR ── */
    .error-msg {
      background: #fde8e8;
      border: 1px solid #d08080;
      color: #8a2020;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* ── NOTE ── */
    .note {
      font-size: 12px;
      color: #888;
      margin-top: 24px;
      line-height: 2;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    /* ── ENHANCER FLIGHTS ── */
    .palace-cell { cursor: pointer; }
    .palace-cell.flight-source {
      outline: 2px solid var(--gold) !important;
      outline-offset: -2px;
      background: #faf6e8 !important;
    }
    .palace-cell.flight-target-lu   { outline: 2px solid var(--lu)   !important; outline-offset: -2px; }
    .palace-cell.flight-target-quan { outline: 2px solid var(--quan) !important; outline-offset: -2px; }
    .palace-cell.flight-target-ke   { outline: 2px solid var(--ke)   !important; outline-offset: -2px; }
    .palace-cell.flight-target-ji   { outline: 2px solid var(--ji)   !important; outline-offset: -2px; }
    .flight-inline-badge {
      animation: flightAppear 0.35s ease forwards;
      opacity: 0;
      margin-left: 3px;
    }
    @keyframes flightAppear {
      from { opacity: 0; transform: translateY(-4px) scale(0.85); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    @keyframes flightDraw {
      from { stroke-dashoffset: var(--fl-len); }
      to   { stroke-dashoffset: 0; }
    }
    #flight-overlay { pointer-events: none; }

    /* ── SOLAR TIME HELPER ── */
    .solar-helper {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .solar-info {
      font-size: 12px;
      color: var(--gold-dim);
      margin-top: 10px;
      padding: 8px 12px;
      background: #faf6e8;
      border-left: 2px solid var(--gold);
    }

    /* ── CITY DROPDOWN ── */
    .city-input-wrap { position: relative; }
    .city-dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      z-index: 200; max-height: 220px; overflow-y: auto;
    }
    .city-dd-item {
      padding: 8px 12px; cursor: pointer;
      border-bottom: 1px solid #f0ece4;
    }
    .city-dd-item:hover { background: #f4f0e4; }
    .city-dd-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .city-dd-detail { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    /* ── BA ZI FOUR PILLARS ── */
    .bazi-section {
      margin-bottom: 12px;
    }

    .bazi-dual {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 6px;
    }
    .bazi-dual .bazi-section { margin-bottom: 0; }
    .bazi-dual .bazi-char    { font-size: 15px; }
    .bazi-dual .bazi-pillar  { padding: 3px 2px; }
    .bazi-dual .bazi-pillar-label { font-size: 7px; margin-bottom: 2px; }

    .bazi-section-label {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: block;
    }

    .bazi-table {
      display: flex;
      border: 1px solid var(--border);
    }

    .bazi-pillar {
      flex: 1;
      text-align: center;
      padding: 6px 2px;
      border-right: 1px solid var(--border);
    }

    .bazi-pillar:last-child { border-right: none; }

    .bazi-pillar-label {
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
      display: block;
    }

    .bazi-char {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      display: block;
      line-height: 1.3;
    }

    /* ── PALACE LAYER LABELS (below palace name) ── */
    .pal-layer { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; display: block; margin-top: 2px; line-height: 1.4; }
    .pal-decade { color: var(--decade-col); }
    .pal-annual { color: var(--annual-col); }

    /* ── CLICKABLE DECADES ── */
    .decade-cell { cursor: pointer; transition: background 0.12s; }
    .decade-cell:hover { background: #f4f0e4; }
    .decade-cell.is-current { background: #f0f8f0; }
    .decade-cell.is-selected { background: #fffae8 !important; border: 2px solid var(--gold) !important; }
    .decade-cell.is-selected .decade-num { color: var(--gold); font-weight: 700; }

    /* ── LAYER CONTROLS STRIP ── */
    .layer-controls { margin: 16px 0; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .layer-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .layer-tag { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; min-width: 56px; text-align: center; }
    .ltag-natal  { background: #fff0ee; color: var(--natal-col);  border: 1px solid #c03020; }
    .ltag-decade { background: #eef8ee; color: var(--decade-col); border: 1px solid #308040; }
    .ltag-annual { background: #eeeeff; color: var(--annual-col); border: 1px solid #3050c0; }
    .year-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 3px 10px; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; }
    .year-btn:hover { background: #f0ece4; }
    .annual-year-val { font-size: 15px; font-weight: 600; color: var(--text); min-width: 40px; text-align: center; }

    @media (max-width: 700px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .form-layout-horizontal { grid-template-columns: 1fr; }
      .palace-cell { min-height: 120px; padding: 8px 6px; }
    }

    @media print {
      @page { size: A4 portrait; margin: 5mm; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { padding: 0 !important; margin: 0 !important; background: white; }
      .form-panel, header, .layer-controls, .legend, .note { display: none !important; }
      .chart-panel {
        display: block !important;
        width: 1080px !important;
        max-width: none !important;
        zoom: 0.64;
        margin: 0 !important;
      }
      .chart-meta { margin-bottom: 8px; padding-bottom: 8px; }
      .palace-cell { min-height: 130px !important; }
      .zwds-grid { page-break-inside: avoid; }
      .decades-section { margin-top: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>紫微斗数 · ZWDS Calculator</h1>
  <p>Zi Wei Dou Shu</p>
</header>

<div class="form-panel">
  <div id="error-display" class="error-msg" style="display:none;"></div>
  <div class="form-layout-horizontal">
    <div class="form-left">
      <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--gold);letter-spacing:2px;margin-bottom:14px;text-transform:uppercase;">Birth Details</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" id="birth-date" value="1979-04-19">
        </div>
        <div class="form-group">
          <label>Time of Birth</label>
          <input type="time" id="birth-time" value="13:30">
        </div>
        <div class="form-group">
          <label>Sex</label>
          <select id="birth-sex">
            <option value="female">Female</option>
            <option value="male">Male</option>
          </select>
        </div>
        <div class="form-group">
          <label>Name (optional)</label>
          <input type="text" id="birth-name" placeholder="Name">
        </div>
      </div>
      <div class="form-actions">
        <button class="secondary" onclick="loadTrump()">Demo Client · Donald Trump</button>
        <button class="secondary" onclick="loadAlena()">Alena Chart</button>
        <button class="secondary" onclick="printChart()">Print / PDF</button>
      </div>
    </div>
    <div class="form-right">
      <div class="solar-helper">
        <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--gold);letter-spacing:2px;margin-bottom:14px;text-transform:uppercase;">Solar Correction</div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>City of Birth</label>
          <div class="city-input-wrap">
            <input type="text" id="birth-city" placeholder="e.g. Saratov, Russia" oninput="onCityInput()" autocomplete="off" style="width:100%;">
            <div id="city-dropdown" class="city-dropdown" style="display:none;"></div>
          </div>
          <div id="city-result" style="font-size:11px;color:#888;margin-top:4px;min-height:16px;"></div>
          <input type="hidden" id="birth-longitude" value="0">
        </div>
        <div class="form-group" style="margin-bottom:16px;">
