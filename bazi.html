<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>八字 · BaZi Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --border: #d8d4c8;
    --gold: #b8882a; --gold-dim: #8a6410;
    --text: #1a1a1a; --text-dim: #555; --text-muted: #888;
    --el-wood: #2e7d32; --el-fire: #c62828; --el-earth: #8d6e2b;
    --el-metal: #607d8b; --el-water: #1565c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { max-width: 100vw; overflow-x: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg);
         color: var(--text); min-height: 100vh; padding: 40px 24px; }

  .lang-switch { position: fixed; top: 14px; right: 16px; z-index: 50; display: flex; gap: 4px; }
  .lang-switch button { background: transparent; border: 1px solid var(--border);
                        color: var(--text-muted); padding: 5px 11px; font-size: 11px; letter-spacing: 1px;
                        cursor: pointer; font-family: 'Inter', sans-serif; }
  .lang-switch button.on { background: var(--gold); border-color: var(--gold); color: #fff; }

  header { text-align: center; margin-bottom: 36px; }
  header h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400;
              letter-spacing: 2px; color: var(--gold); }
  header p { font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
             color: var(--text-muted); margin-top: 6px; }

  .form-panel { max-width: 820px; margin: 0 auto 24px; background: var(--surface);
                border: 1px solid var(--border); padding: 24px 28px; }
  .section-label { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500;
                   color: var(--gold); letter-spacing: 2px; margin-bottom: 14px; text-transform: uppercase; }
  .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; position: relative; }
  .form-group.wide2 { grid-column: span 2; }
  .form-group.full  { grid-column: 1 / -1; }
  label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
  input, select { background: #f8f6f2; border: 1px solid var(--border); color: var(--text);
                  padding: 10px 12px; font-size: 14px; font-family: 'Inter', sans-serif;
                  outline: none; width: 100%; transition: border-color .2s; }
  input:focus, select:focus { border-color: var(--gold); }
  .form-actions { margin-top: 18px; }
  .btn-compute { width: 100%; background: var(--gold); border: 1px solid var(--gold); color: #fff;
                 padding: 12px 14px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
                 font-family: 'Inter', sans-serif; cursor: pointer; transition: background .2s; }
  .btn-compute:hover { background: var(--gold-dim); }

  .city-dd { position: absolute; top: 100%; left: 0; right: 0; z-index: 20; background: #fff;
             border: 1px solid var(--border); border-top: none; max-height: 220px; overflow-y: auto; display: none; }
  .city-opt { padding: 8px 12px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
  .city-opt:hover { background: #faf7ef; }
  .solar-info { font-size: 11px; color: var(--gold-dim); margin-top: 6px; min-height: 14px; grid-column: 1 / -1; }
  .error-msg { max-width: 820px; margin: 0 auto 20px; background: #fde8e8; border: 1px solid #d08080;
               color: #8a2020; padding: 12px 16px; font-size: 13px; display: none; }

  .result { max-width: 820px; margin: 0 auto; display: none; }

  /* ── Four Pillars main table ─────────────────────────── */
  .pillars {
    background: var(--surface); border: 1px solid var(--border);
    display: grid; grid-template-columns: 100px repeat(4, 1fr);
    margin-bottom: 18px;
  }
  .pil-row { display: contents; }
  .pil-row > div { padding: 10px 12px; border-bottom: 1px solid var(--border);
                   border-right: 1px solid var(--border); text-align: center; font-size: 13px; }
  .pil-row > div:last-child { border-right: none; }
  .pil-row:last-child > div { border-bottom: none; }
  .pil-h { background: #faf7ef; color: var(--text-muted); font-size: 10px;
           letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
  .pil-label { background: #faf7ef; color: var(--gold-dim); font-size: 10px;
               letter-spacing: 1.5px; text-transform: uppercase; text-align: left; }
  .pil-shen { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
  .pil-gan  { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; line-height: 1; padding-top: 12px; }
  .pil-zhi  { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; line-height: 1; }
  .pil-hide { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  .pil-hide .hg { font-family: 'Cormorant Garamond', serif; font-size: 15px; margin: 0 3px 0 0; }
  .pil-hide .hs { font-size: 10px; color: var(--text-muted); margin-right: 8px; }
  .pil-nayin { font-size: 12px; color: var(--text-dim); }
  .pil-day-master { font-size: 10px; letter-spacing: 2px; color: var(--gold); font-weight: 700; text-transform: uppercase; }

  .el-wood  { color: var(--el-wood); }
  .el-fire  { color: var(--el-fire); }
  .el-earth { color: var(--el-earth); }
  .el-metal { color: var(--el-metal); }
  .el-water { color: var(--el-water); }

  /* ── Summary block ─────────────────────────── */
  .summary {
    background: var(--surface); border: 1px solid var(--border);
    padding: 16px 20px; margin-bottom: 18px;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  }
  .sum-item { display: flex; flex-direction: column; gap: 4px; }
  .sum-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .sum-value { font-size: 15px; color: var(--text); font-weight: 500; }
  .sum-value .cn { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-right: 5px; }

  /* ── Luck Pillars (大运) ────────────────── */
  .dayun {
    background: var(--surface); border: 1px solid var(--border); margin-bottom: 18px;
  }
  .dayun-title { padding: 12px 20px; background: #faf7ef; font-size: 11px; letter-spacing: 2px;
                 text-transform: uppercase; color: var(--gold-dim); font-weight: 700;
                 border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .dayun-grid { display: grid; grid-template-columns: repeat(10, 1fr); }
  .dayun-cell { padding: 12px 6px; text-align: center; border-right: 1px solid var(--border); font-size: 12px; }
  .dayun-cell:last-child { border-right: none; }
  .dayun-cell.current { background: #fdf5df; }
  .dayun-age { color: var(--text-muted); font-size: 10px; letter-spacing: 1px; margin-bottom: 4px; }
  .dayun-gz { font-family: 'Cormorant Garamond', serif; font-size: 22px; line-height: 1.15; font-weight: 600; }
  .dayun-year { color: var(--text-muted); font-size: 10px; margin-top: 4px; }
  .dayun-shen { color: var(--text-dim); font-size: 10px; margin-top: 3px; }

  /* ── Annual (流年) ───────────────────────── */
  .liunian {
    background: var(--surface); border: 1px solid var(--border); padding: 16px 20px; margin-bottom: 18px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .liunian-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dim); font-weight: 700; }
  .liunian-gz { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; }
  .liunian-meta { font-size: 12px; color: var(--text-dim); }

  footer-note { display: block; text-align: center; font-size: 10px; letter-spacing: 2px;
                text-transform: uppercase; color: var(--text-muted); margin-top: 20px; }

  @media (max-width: 640px) {
    body { padding: 30px 14px; }
    .lang-switch { top: 10px; right: 10px; }
    header h1 { font-size: 22px; }
    .form-panel { padding: 18px 18px; }
    .form-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group.wide2 { grid-column: 1 / -1; }

    .pillars { grid-template-columns: 82px repeat(4, 1fr); }
    .pil-row > div { padding: 8px 4px; font-size: 11px; }
    .pil-label { font-size: 9px; letter-spacing: 1px; padding-left: 8px; }
    .pil-gan, .pil-zhi { font-size: 22px; }
    .pil-hide .hg { font-size: 13px; }

    .summary { grid-template-columns: 1fr 1fr; }
    .dayun-grid { grid-template-columns: repeat(5, 1fr); }
    .dayun-cell { border-bottom: 1px solid var(--border); }
    .dayun-cell:nth-child(5) { border-right: none; }
    .dayun-cell:nth-child(n+6) { border-bottom: none; }
    .dayun-gz { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="lang-switch">
  <button id="lang-ru" class="on" type="button">RU</button>
  <button id="lang-en" type="button">EN</button>
</div>

<header>
  <h1>八字 · BaZi Calculator</h1>
  <p data-i18n="tagline">Ба Цзы · Четыре столпа судьбы · Солнечный календарь</p>
</header>

<div class="error-msg" id="error-display"></div>

<div class="form-panel">
  <div class="section-label" data-i18n="birthTitle">Дата, время и город рождения</div>
  <div class="form-grid">
    <div class="form-group">
      <label data-i18n="year">Год</label>
      <input type="number" id="f-year" value="1990" min="1900" max="2100">
    </div>
    <div class="form-group">
      <label data-i18n="month">Месяц</label>
      <input type="number" id="f-month" value="1" min="1" max="12">
    </div>
    <div class="form-group">
      <label data-i18n="day">День</label>
      <input type="number" id="f-day" value="1" min="1" max="31">
    </div>
    <div class="form-group">
      <label data-i18n="sex">Пол</label>
      <select id="f-sex">
        <option value="1" data-i18n="male">Мужской</option>
        <option value="0" data-i18n="female">Женский</option>
      </select>
    </div>
    <div class="form-group">
      <label data-i18n="hour">Час</label>
      <input type="number" id="f-hour" value="12" min="0" max="23">
    </div>
    <div class="form-group">
      <label data-i18n="minute">Минута</label>
      <input type="number" id="f-min" value="0" min="0" max="59">
    </div>
    <div class="form-group wide2">
      <label data-i18n="city">Город (для пересчёта в солнечное время)</label>
      <input type="text" id="f-city" value="Amsterdam" autocomplete="off">
      <div class="city-dd" id="city-dd"></div>
    </div>
    <div class="solar-info" id="solar-info"></div>
  </div>
  <div class="form-actions">
    <button class="btn-compute" id="btn-compute" data-i18n="compute">Рассчитать</button>
  </div>
</div>

<div class="result" id="result">

  <!-- 4 pillars -->
  <div class="pillars" id="pillars"></div>

  <!-- Summary -->
  <div class="summary" id="summary"></div>

  <!-- Luck pillars -->
  <div class="dayun">
    <div class="dayun-title">
      <span data-i18n="dayunTitle">Большие циклы (大运)</span>
      <span class="dayun-start" id="dayun-start"></span>
    </div>
    <div class="dayun-grid" id="dayun-grid"></div>
  </div>

  <!-- Annual pillar (this year) -->
  <div class="liunian" id="liunian"></div>

</div>

<script src="/tz.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script>
/* ===== i18n ===== */
const I18N = {
  ru: {
    tagline: "Ба Цзы · Четыре столпа судьбы · Солнечный календарь",
    birthTitle: "Дата, время и город рождения",
    year: "Год", month: "Месяц", day: "День",
    hour: "Час", minute: "Минута",
    sex: "Пол", male: "Мужской", female: "Женский",
    city: "Город (для пересчёта в солнечное время)",
    cityPh: "Начните вводить город...",
    compute: "Рассчитать",
    hourP: "Час", dayP: "День", monthP: "Месяц", yearP: "Год",
    tenGodStem: "Десять богов (ствол)",
    stem: "Ствол", branch: "Ветвь",
    hidden: "Скрытые стволы",
    nayin: "На Инь",
    dayMaster: "Хозяин дня",
    dayMasterEl: "Стихия хозяина дня",
    season: "Сезон",
    voidBranches: "Пустые ветви (空亡)",
    lunarDate: "Лунная дата",
    dayunTitle: "Большие циклы (大运)",
    dayunStart: "Начало: возраст",
    liunianTitle: "Текущий год (流年)",
    computeFirst: "Введите данные и нажмите «Рассчитать».",
    invalidDate: "Такой даты не существует.",
    checkDT: "Проверьте дату и время.",
    calcErr: "Ошибка расчёта: ",
    mm: "мин",
    yang: "Ян", yin: "Инь",
    spring: "Весна", summer: "Лето", autumn: "Осень", winter: "Зима"
  },
  en: {
    tagline: "Ba Zi · Four Pillars of Destiny · Solar Calendar",
    birthTitle: "Birth date, time and city",
    year: "Year", month: "Month", day: "Day",
    hour: "Hour", minute: "Minute",
    sex: "Sex", male: "Male", female: "Female",
    city: "City (for solar-time correction)",
    cityPh: "Start typing a city...",
    compute: "Compute",
    hourP: "Hour", dayP: "Day", monthP: "Month", yearP: "Year",
    tenGodStem: "Ten Gods (Stem)",
    stem: "Stem", branch: "Branch",
    hidden: "Hidden Stems",
    nayin: "Na Yin",
    dayMaster: "Day Master",
    dayMasterEl: "Day Master Element",
    season: "Season",
    voidBranches: "Void (Kong Wang)",
    lunarDate: "Lunar date",
    dayunTitle: "Luck Pillars (大运)",
    dayunStart: "Start age",
    liunianTitle: "Current Year (流年)",
    computeFirst: "Enter data and press Compute.",
    invalidDate: "This date does not exist.",
    checkDT: "Check date and time.",
    calcErr: "Calculation error: ",
    mm: "min",
    yang: "Yang", yin: "Yin",
    spring: "Spring", summer: "Summer", autumn: "Autumn", winter: "Winter"
  }
};
let LANG = "ru";
const L = () => I18N[LANG];

/* ===== Element / stem-branch tables ===== */
const STEM_EL = {甲:"wood",乙:"wood",丙:"fire",丁:"fire",戊:"earth",己:"earth",庚:"metal",辛:"metal",壬:"water",癸:"water"};
const BRANCH_EL = {子:"water",丑:"earth",寅:"wood",卯:"wood",辰:"earth",巳:"fire",午:"fire",未:"earth",申:"metal",酉:"metal",戌:"earth",亥:"water"};
const STEM_YY = {甲:"yang",乙:"yin",丙:"yang",丁:"yin",戊:"yang",己:"yin",庚:"yang",辛:"yin",壬:"yang",癸:"yin"};
const EL_NAME_RU = {wood:"Дерево",fire:"Огонь",earth:"Земля",metal:"Металл",water:"Вода"};
const EL_NAME_EN = {wood:"Wood",fire:"Fire",earth:"Earth",metal:"Metal",water:"Water"};
const elClass = ch => "el-" + (STEM_EL[ch] || BRANCH_EL[ch] || "");
const elName  = ch => (LANG === "ru" ? EL_NAME_RU : EL_NAME_EN)[STEM_EL[ch] || BRANCH_EL[ch]] || "";

/* Ten Gods table: index by (DM index, target index) — computed via lunar-js */

/* Season from month branch (BaZi solar month) */
const SEASON_BY_BRANCH = {
  寅:"spring",卯:"spring",辰:"spring",
  巳:"summer",午:"summer",未:"summer",
  申:"autumn",酉:"autumn",戌:"autumn",
  亥:"winter",子:"winter",丑:"winter"
};

/* ===== City + solar time ===== */
let LON = 4.9041, TZNAME = "Europe/Amsterdam", CITYNAME = "Amsterdam", _cityTimer = null;
const v = id => document.getElementById(id).value;
const pad = n => String(n).padStart(2, "0");

function showError(m){ const e=document.getElementById("error-display"); e.textContent=m; e.style.display="block"; }
function hideError(){ document.getElementById("error-display").style.display="none"; }

function tzOffsetMin(date, tz){
  try{
    const f=new Intl.DateTimeFormat("en-US",{timeZone:tz,hour12:false,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const p={}; f.formatToParts(date).forEach(x=>p[x.type]=x.value);
    const hh=p.hour==="24"?"00":p.hour;
    return Math.round((Date.UTC(+p.year,+p.month-1,+p.day,+hh,+p.minute,+p.second)-date.getTime())/60000);
  }catch(e){ return Math.round(LON/15)*60; }
}
function corrMin(d){ return Math.round((LON-15*(tzOffsetMin(d,TZNAME)/60))*4); }

function onCityInput(){
  clearTimeout(_cityTimer);
  const q=v("f-city").trim();
  if(q.length<2){document.getElementById("city-dd").style.display="none";return;}
  _cityTimer=setTimeout(()=>fetchCities(q),350);
}
async function fetchCities(q){
  const dd=document.getElementById("city-dd");
  try{
    const r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&accept-language="+LANG+"&limit=6&q="+encodeURIComponent(q));
    const arr=await r.json();
    if(!arr||!arr.length){dd.style.display="none";return;}
    dd._data=arr;
    dd.innerHTML=arr.map((c,i)=>`<div class="city-opt" data-i="${i}">${c.display_name}</div>`).join("");
    dd.style.display="block";
    dd.querySelectorAll(".city-opt").forEach(el=>el.addEventListener("click", e=>selectCity(+el.getAttribute("data-i"))));
  }catch(e){ dd.style.display="none"; }
}
function selectCity(i){
  const dd=document.getElementById("city-dd"), c=dd._data[i];
  LON=parseFloat(c.lon); CITYNAME=c.display_name.split(",")[0];
  try{ TZNAME=tzlookup(parseFloat(c.lat),LON); }catch(e){}
  document.getElementById("f-city").value=CITYNAME; dd.style.display="none";
  updateSolarInfo();
}
function updateSolarInfo(){
  const y=+v("f-year"),mo=+v("f-month"),d=+v("f-day"),h=+v("f-hour")||0,mi=+v("f-min")||0;
  if(!y||!mo||!d) return;
  const clock=new Date(y,mo-1,d,h,mi,0);
  if(isNaN(clock.getTime())) return;
  const cm=corrMin(clock);
  const sign=cm>=0?"+":"-";
  document.getElementById("solar-info").textContent =
    `${CITYNAME} · ${LON.toFixed(2)}° · ${sign}${Math.abs(cm)} ${L().mm}`;
}

/* ===== Compute ===== */
function compute(){
  hideError();
  try{
    const y=+v("f-year"),mo=+v("f-month"),d=+v("f-day"),h=+v("f-hour")||0,mi=+v("f-min")||0;
    const sex=+v("f-sex"); // 1=male, 0=female
    if(!y||!mo||!d){ showError(L().checkDT); return; }
    const clock=new Date(y,mo-1,d,h,mi,0);
    if(clock.getFullYear()!==y||clock.getMonth()!==mo-1||clock.getDate()!==d){
      showError(L().invalidDate); return;
    }
    const cm=corrMin(clock);
    const solar=new Date(clock.getTime()+cm*60000);
    const sy=solar.getFullYear(), smo=solar.getMonth()+1, sd=solar.getDate(),
          sh=solar.getHours(), smi=solar.getMinutes();

    const S = Solar.fromYmdHms(sy,smo,sd,sh,smi,0);
    const lunar = S.getLunar();
    const ec = lunar.getEightChar();

    render(ec, lunar, sex, cm);
    document.getElementById("result").style.display="block";
  }catch(err){
    console.error(err);
    showError(L().calcErr + err.message);
  }
}

/* ===== Render ===== */
function pillarsCells(ec){
  // Order columns: Hour, Day, Month, Year (traditional right-to-left; we display L->R)
  const yG=ec.getYear(),  yZ=ec.getYearZhi(),  yStem=ec.getYearGan();
  const mG=ec.getMonth(), mZ=ec.getMonthZhi(), mStem=ec.getMonthGan();
  const dG=ec.getDay(),   dZ=ec.getDayZhi(),   dStem=ec.getDayGan();
  const tG=ec.getTime(),  tZ=ec.getTimeZhi(),  tStem=ec.getTimeGan();

  const shen = ec.getShiShenGan ? [ec.getShiShenGan()] : null;
  // Ten Gods relative to Day Master: getYearShiShenGan / getMonthShiShenGan / getTimeShiShenGan
  const yShen = ec.getYearShiShenGan();
  const mShen = ec.getMonthShiShenGan();
  const tShen = ec.getTimeShiShenGan();

  // Hidden stems + ten gods
  const yHide = ec.getYearHideGan(),  yHideShen = ec.getYearShiShenZhi();
  const mHide = ec.getMonthHideGan(), mHideShen = ec.getMonthShiShenZhi();
  const dHide = ec.getDayHideGan(),   dHideShen = ec.getDayShiShenZhi();
  const tHide = ec.getTimeHideGan(),  tHideShen = ec.getTimeShiShenZhi();

  // Nayin
  const yNy = ec.getYearNaYin();
  const mNy = ec.getMonthNaYin();
  const dNy = ec.getDayNaYin();
  const tNy = ec.getTimeNaYin();

  return {
    labels: [L().hourP, L().dayP, L().monthP, L().yearP],
    shen:   [tShen, "—", mShen, yShen],
    stem:   [tStem, dStem, mStem, yStem],
    zhi:    [tZ, dZ, mZ, yZ],
    hide:   [tHide, dHide, mHide, yHide],
    hideShen:[tHideShen, dHideShen, mHideShen, yHideShen],
    nayin:  [tNy, dNy, mNy, yNy],
    isDay:  [false, true, false, false]
  };
}

function renderPillars(ec){
  const p = pillarsCells(ec);
  const rows = [];

  // Header row
  rows.push(`<div class="pil-row">
    <div class="pil-h">&nbsp;</div>
    <div class="pil-h">${p.labels[0]}</div>
    <div class="pil-h">${p.labels[1]}</div>
    <div class="pil-h">${p.labels[2]}</div>
    <div class="pil-h">${p.labels[3]}</div>
  </div>`);

  // Ten God (stem)
  rows.push(`<div class="pil-row">
    <div class="pil-label">${L().tenGodStem}</div>
    ${p.shen.map((s,i)=> p.isDay[i]
      ? `<div class="pil-day-master">${L().dayMaster}</div>`
      : `<div class="pil-shen">${s}</div>`).join("")}
  </div>`);

  // Stem
  rows.push(`<div class="pil-row">
    <div class="pil-label">${L().stem}</div>
    ${p.stem.map(s=>`<div class="pil-gan ${elClass(s)}">${s}</div>`).join("")}
  </div>`);

  // Branch
  rows.push(`<div class="pil-row">
    <div class="pil-label">${L().branch}</div>
    ${p.zhi.map(z=>`<div class="pil-zhi ${elClass(z)}">${z}</div>`).join("")}
  </div>`);

  // Hidden stems
  rows.push(`<div class="pil-row">
    <div class="pil-label">${L().hidden}</div>
    ${p.hide.map((arr,i)=>{
      const shen = p.hideShen[i] || [];
      return `<div class="pil-hide">${arr.map((g,j)=>
        `<span class="hg ${elClass(g)}">${g}</span><span class="hs">${shen[j]||""}</span>`
      ).join("")}</div>`;
    }).join("")}
  </div>`);

  // Nayin
  rows.push(`<div class="pil-row">
    <div class="pil-label">${L().nayin}</div>
    ${p.nayin.map(n=>`<div class="pil-nayin">${n}</div>`).join("")}
  </div>`);

  document.getElementById("pillars").innerHTML = rows.join("");
}

function renderSummary(ec, lunar){
  const dmStem = ec.getDayGan();
  const dmEl = STEM_EL[dmStem];
  const dmYY = STEM_YY[dmStem];
  const dmYYName = dmYY === "yang" ? L().yang : L().yin;

  const monthZhi = ec.getMonthZhi();
  const season = SEASON_BY_BRANCH[monthZhi];
  const seasonName = L()[season] || "";

  // Void branches: use day-pillar-based Xun Kong
  const kong = ec.getDayXunKong ? ec.getDayXunKong() : "";
  const kongStr = kong ? kong.split("").map(z=>`<span class="cn ${elClass(z)}">${z}</span>`).join(" ") : "—";

  // Lunar date
  const lunarStr = `${lunar.getYearInChinese()} · ${lunar.getMonthInChinese()}月 · ${lunar.getDayInChinese()}`;

  document.getElementById("summary").innerHTML = `
    <div class="sum-item">
      <div class="sum-label">${L().dayMaster}</div>
      <div class="sum-value"><span class="cn ${elClass(dmStem)}">${dmStem}</span></div>
    </div>
    <div class="sum-item">
      <div class="sum-label">${L().dayMasterEl}</div>
      <div class="sum-value"><span class="${elClass(dmStem)}">${elName(dmStem)} · ${dmYYName}</span></div>
    </div>
    <div class="sum-item">
      <div class="sum-label">${L().season}</div>
      <div class="sum-value"><span class="cn ${elClass(monthZhi)}">${monthZhi}</span> ${seasonName}</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">${L().voidBranches}</div>
      <div class="sum-value">${kongStr}</div>
    </div>
  `;
}

function renderDayun(ec, sex){
  // sex: 1=male, 0=female. Yun.getYun(gender, sect). Gender: 1=male, 0=female per lunar-js.
  const yun = ec.getYun(sex, 2); // sect=2 for modern-common calculation
  const arr = yun.getDaYun(11); // [childhood(index 0), luck1..luck10]
  const firstLuck = arr[1];
  const startYear = firstLuck ? firstLuck.getStartYear() : "";
  const startAge = firstLuck ? firstLuck.getStartAge() : "";
  const currentYear = (new Date()).getFullYear();

  const cells = [];
  for (let i = 1; i <= 10; i++) {
    const d = arr[i];
    if (!d) break;
    const gz = d.getGanZhi();
    const startY = d.getStartYear();
    const endY = d.getEndYear();
    const startA = d.getStartAge();
    const endA = d.getEndAge();
    const isCurrent = currentYear >= startY && currentYear <= endY;

    // Ten God for this DaYun stem relative to DM
    const gan = gz.charAt(0), zhi = gz.charAt(1);
    const shen = tenGodStem(ec.getDayGan(), gan);

    cells.push(`<div class="dayun-cell ${isCurrent ? "current" : ""}">
      <div class="dayun-age">${startA}–${endA}</div>
      <div class="dayun-gz">
        <span class="${elClass(gan)}">${gan}</span><br>
        <span class="${elClass(zhi)}">${zhi}</span>
      </div>
      <div class="dayun-shen">${shen}</div>
      <div class="dayun-year">${startY}–${endY}</div>
    </div>`);
  }

  document.getElementById("dayun-grid").innerHTML = cells.join("");
  document.getElementById("dayun-start").textContent =
    `${L().dayunStart}: ${startAge} · ${startYear}`;
}

/* Ten Gods relative to Day Master */
const STEM_IDX = {甲:0,乙:1,丙:2,丁:3,戊:4,己:5,庚:6,辛:7,壬:8,癸:9};
const TEN_GODS_RU = ["比肩","劫财","食神","伤官","偏财","正财","七杀","正官","偏印","正印"];
// Map: (target_el rel to DM_el, target_polarity rel to DM_polarity) → ten god
function tenGodStem(dm, target){
  if (!dm || !target) return "";
  const dmEl = STEM_EL[dm], tEl = STEM_EL[target];
  const dmY = STEM_YY[dm], tY = STEM_YY[target];
  const rel = elRelation(dmEl, tEl); // "self","gen_out","overc_out","overc_in","gen_in"
  const same = (dmY === tY);
  const map = {
    self:     same ? "比肩" : "劫财",
    gen_out:  same ? "食神" : "伤官",
    overc_out:same ? "七杀" : "正官",   // note: overc_out from DM's perspective is DM overcoming target
    // reversed
  };
  // Simpler: use standard 10-gods matrix by (dm_idx, target_idx)
  const M = [
    // 甲  乙  丙  丁  戊  己  庚  辛  壬  癸
    ["比肩","劫财","食神","伤官","偏财","正财","七杀","正官","偏印","正印"], // 甲
    ["劫财","比肩","伤官","食神","正财","偏财","正官","七杀","正印","偏印"], // 乙
    ["偏印","正印","比肩","劫财","食神","伤官","偏财","正财","七杀","正官"], // 丙
    ["正印","偏印","劫财","比肩","伤官","食神","正财","偏财","正官","七杀"], // 丁
    ["七杀","正官","偏印","正印","比肩","劫财","食神","伤官","偏财","正财"], // 戊
    ["正官","七杀","正印","偏印","劫财","比肩","伤官","食神","正财","偏财"], // 己
    ["偏财","正财","七杀","正官","偏印","正印","比肩","劫财","食神","伤官"], // 庚
    ["正财","偏财","正官","七杀","正印","偏印","劫财","比肩","伤官","食神"], // 辛
    ["食神","伤官","偏财","正财","七杀","正官","偏印","正印","比肩","劫财"], // 壬
    ["伤官","食神","正财","偏财","正官","七杀","正印","偏印","劫财","比肩"]  // 癸
  ];
  return M[STEM_IDX[dm]][STEM_IDX[target]];
}
function elRelation(){ return ""; } // placeholder; not used

function renderLiunian(ec){
  const dm = ec.getDayGan();
  const y = (new Date()).getFullYear();
  const S = Solar.fromYmdHms(y, 6, 1, 12, 0, 0); // any mid-year date
  const lu = S.getLunar();
  const yStem = lu.getYearGanByLiChun();
  const yZhi = lu.getYearZhiByLiChun();
  const shen = tenGodStem(dm, yStem);
  document.getElementById("liunian").innerHTML = `
    <div class="liunian-label">${y} · ${L().liunianTitle}</div>
    <div class="liunian-gz">
      <span class="${elClass(yStem)}">${yStem}</span><span class="${elClass(yZhi)}">${yZhi}</span>
    </div>
    <div class="liunian-meta">${shen} · ${elName(yStem)} / ${elName(yZhi)}</div>
  `;
}

function render(ec, lunar, sex, cm){
  renderPillars(ec);
  renderSummary(ec, lunar);
  renderDayun(ec, sex);
  renderLiunian(ec);
  const sign=cm>=0?"+":"-";
  document.getElementById("solar-info").textContent =
    `${CITYNAME} · ${LON.toFixed(2)}° · ${sign}${Math.abs(cm)} ${L().mm}`;
}

  document.documentElement.lang = LANG;

  document.getElementById("lang-en").classList.toggle("on", LANG==="en");
}

["f-year","f-month","f-day","f-hour","f-min"].forEach(id =>
